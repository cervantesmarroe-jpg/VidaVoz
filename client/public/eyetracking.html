<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EyeTracking Clínico Pro</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f172a;
      color: #f1f5f9;
      font-family: system-ui, sans-serif;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 20px 12px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.25rem; font-weight: 700; }
    #status {
      font-size: 0.875rem; color: #94a3b8;
      flex: 1; text-align: right;
    }
    #status.ok    { color: #34d399; }
    #status.warn  { color: #fbbf24; }
    #status.error { color: #f87171; }

    #video-wrapper {
      position: relative; flex: 1; overflow: hidden; background: #000;
    }

    /* Miniatura de cámara + canvas de malla — esquina inferior derecha */
    #webcam, #output_canvas {
      position: absolute; bottom: 16px; right: 16px;
      width: 220px; height: 165px;
      border-radius: 12px; object-fit: cover;
      transform: scaleX(-1); z-index: 10;
    }
    #webcam { border: 2px solid #334155; }
    #output_canvas { z-index: 11; pointer-events: none; }

    /* Punto de mirada */
    #gaze-dot {
      position: absolute;
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(99,102,241,0.85);
      border: 3px solid #c7d2fe;
      box-shadow: 0 0 18px 6px rgba(99,102,241,0.5);
      transform: translate(-50%, -50%);
      pointer-events: none; z-index: 20; display: none;
      transition: left 0.06s linear, top 0.06s linear;
    }

    /* Pantalla de inicio */
    #screen-start {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      z-index: 30; background: #0f172a88;
    }
    #screen-start.hidden { display: none; }

    /* Pantalla de calibración */
    #screen-calibration {
      position: absolute; inset: 0;
      display: none; z-index: 30;
      background: #0f172a;
    }
    #screen-calibration.visible { display: block; }

    /* Instrucción calibración */
    #calib-instruction {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      background: #1e293b; border: 1px solid #334155;
      border-radius: 12px; padding: 12px 28px;
      text-align: center; font-size: 1rem; white-space: nowrap;
    }
    #calib-instruction strong { color: #fbbf24; }

    /* Puntos de calibración */
    .calibration-point {
      position: absolute;
      width: 56px; height: 56px; border-radius: 50%;
      background: #334155; border: 3px solid #fbbf24;
      cursor: pointer; transform: translate(-50%, -50%);
      transition: background 0.2s, transform 0.12s;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 800; color: #fbbf24;
    }
    .calibration-point:hover  { background: #475569; }
    .calibration-point:active { transform: translate(-50%,-50%) scale(0.85); }
    .calibration-point.done   { background: #14532d; border-color: #4ade80; color: #4ade80; }

    /* Botón "Iniciar seguimiento" — aparece cuando todos los puntos están calibrados */
    #btn-start-tracking {
      position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
      display: none;
    }
    #btn-start-tracking.visible { display: block; }

    /* Panel de datos durante seguimiento */
    #data-panel {
      position: absolute; bottom: 16px; left: 16px; z-index: 25;
      background: #1e293b; border: 1px solid #334155; border-radius: 12px;
      padding: 10px 20px; font-size: 0.95rem;
      display: none; gap: 20px;
    }
    #data-panel.visible { display: flex; }
    #data-panel span { font-weight: 700; color: #818cf8; }

    .medical-btn {
      background: #6366f1; color: #fff;
      font-size: 1.15rem; font-weight: 800;
      padding: 16px 36px; border: none; border-radius: 14px;
      cursor: pointer; letter-spacing: 0.05em;
      box-shadow: 0 4px 24px rgba(99,102,241,0.45);
      transition: background 0.15s, transform 0.1s;
    }
    .medical-btn:hover  { background: #818cf8; }
    .medical-btn:active { transform: scale(0.96); }
  </style>
</head>
<body>

  <header>
    <h1>Asistente de Mirada Pro</h1>
    <p id="status">Iniciando IA Médica…</p>
  </header>

  <div id="video-wrapper">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    <div id="gaze-dot"></div>

    <!-- Pantalla 1: inicio -->
    <div id="screen-start">
      <button id="btn-start" class="medical-btn">ACTIVAR CÁMARA</button>
    </div>

    <!-- Pantalla 2: calibración 9 puntos -->
    <div id="screen-calibration">
      <div id="calib-instruction">
        Mire cada punto y <strong>haga clic</strong> sobre él (3 veces mínimo cada uno)
      </div>

      <!-- 3 × 3 grid: posiciones en % -->
      <div class="calibration-point" data-id="0" style="left:10%;top:15%">3</div>
      <div class="calibration-point" data-id="1" style="left:50%;top:15%">3</div>
      <div class="calibration-point" data-id="2" style="left:90%;top:15%">3</div>
      <div class="calibration-point" data-id="3" style="left:10%;top:50%">3</div>
      <div class="calibration-point" data-id="4" style="left:50%;top:50%">3</div>
      <div class="calibration-point" data-id="5" style="left:90%;top:50%">3</div>
      <div class="calibration-point" data-id="6" style="left:10%;top:85%">3</div>
      <div class="calibration-point" data-id="7" style="left:50%;top:85%">3</div>
      <div class="calibration-point" data-id="8" style="left:90%;top:85%">3</div>

      <button id="btn-start-tracking" class="medical-btn">
        INICIAR SEGUIMIENTO DE MIRADA
      </button>
    </div>

    <!-- Panel X/Y durante el tracking -->
    <div id="data-panel">
      <p>X: <span id="val-x">0</span></p>
      <p>Y: <span id="val-y">0</span></p>
      <p>Muestras: <span id="val-samples">0</span></p>
    </div>
  </div>

  <script type="module" src="/eyetracking-script.js"></script>
</body>
</html>
